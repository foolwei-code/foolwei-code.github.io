baseURL = "https://foolwei-code.github.io/"
languageCode = 'zh-cn'
title = "Konger's blog"
theme = 'github-style'
pygmentsCodeFences = true
pygmentsUseClasses = true

[params]
  author = 'Konger'
  description = 'In solitude, where we are least alone.'
  github = 'foolwei-code'
  email = '3288529254@qq.com'
  url = 'https://foolwei.com/'
  keywords = 'blog, google analytics'
  rss = true
  lastmod = true
  avatar = '/images/avatar.png'
  headerIcon = "/images/page.png"
  location = 'China'
  enableGitalk = true
  custom_css = ["css/custom.css"]
  custom_js = ["js/custom.js"]
  enableSearch = true

[outputs]
  home = ["html", "json"]

[outputFormats.json]
  mediaType = "application/json"
  baseName = "index"
  isPlainText = false

[caches]
 [caches.images]
  dir = ':cacheDir/images'
